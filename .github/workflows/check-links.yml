name: 🔗 链接检查 | Link Checker

on:
  schedule:
    - cron: '0 0 1 * *'  # 每月1日运行 (UTC 00:00)
  workflow_dispatch:       # 支持手动触发
  push:
    branches: [master]
    paths: ['README.md']

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 100..=399
            --timeout 30
            --max-retries 3
            --exclude-mail
            --exclude "^https://opencollective.com"
            --exclude "^https://img.shields.io"
            --exclude "^https://github.com/.*"
            './README.md'
          fail: false

      - name: Upload link check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-check-report
          path: ./lychee/out.md
          retention-days: 30

      - name: Create issue for broken links
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('./lychee/out.md', 'utf8');
            if (report.includes('Errors')) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔗 发现失效链接 | Broken Links Detected',
                body: '## 失效链接报告\n\n' + report + '\n\n---\n_此 Issue 由自动化工作流生成_',
                labels: ['broken-links', 'maintenance']
              });
            }
