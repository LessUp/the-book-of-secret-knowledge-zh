name: 检查失效链接

on:
  schedule:
    - cron: '0 0 1 * *'  # 每月1日运行
  workflow_dispatch:       # 支持手动触发

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --accept 100..=399
            --timeout 30
            --max-retries 3
            --exclude-mail
            --exclude "^https://opencollective.com"
            --exclude "^https://img.shields.io"
            './README.md'
          fail: false

      - name: Upload link check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-check-report
          path: ./lychee/out.md
          retention-days: 30
